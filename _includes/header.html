<header class="site-header">
  <div class="container header-shell">
    <div class="header-top">
      <a
        class="site-brand site-brand--logo"
        href="{{ '/index.html' | relative_url }}"
        aria-label="Accueil - Un Monde Universel"
      >
        <img
          class="site-brand__logo"
          src="{{ '/assets/images/logo-umu-final.png' | relative_url }}"
          alt="Un Monde Universel — Parce que personne ne devrait être laissé derrière"
          loading="eager"
          decoding="async"
        >
      </a>

      <div class="header-actions">
        <button class="lang-btn" type="button" data-lang-toggle aria-label="Switch language">EN</button>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Basculer le thème">
          <span aria-hidden="true">◐</span>
        </button>
      </div>
    </div>

    {% include nav.html %}
  </div>
</header>
