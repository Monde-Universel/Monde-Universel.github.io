<nav class="site-nav" aria-label="Navigation principale">
  <ul>
    {% for item in site.data.navigation %}
      {% assign current = false %}
      {% if page.url == item.url %}
        {% assign current = true %}
      {% endif %}
      <li>
        <a href="{{ item.url | relative_url }}"{% if current %} aria-current="page"{% endif %}>{{ item.title }}</a>
      </li>
    {% endfor %}
  </ul>
</nav>
