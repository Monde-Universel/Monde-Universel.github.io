<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'fr' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title | default: "Universel" }}</title>

    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="{{ page.keywords }}">
    <meta name="robots" content="{{ page.robots | default: 'index, follow' }}">
    <meta name="author" content="{{ page.author }}">
    <link rel="canonical" href="{{ page.canonical | default: page.url | absolute_url }}">

    <meta property="og:title" content="{{ page.og_title | default: page.title }}">
    <meta property="og:description" content="{{ page.og_description | default: page.description }}">
    <meta property="og:image" content="{{ page.og_image }}">
    <meta property="og:url" content="{{ page.og_url | default: page.url | absolute_url }}">
    <meta property="og:type" content="{{ page.og_type | default: 'website' }}">
    <meta property="og:locale" content="{{ page.og_locale | default: 'fr_CA' }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.og_title | default: page.title }}">
    <meta name="twitter:description" content="{{ page.og_description | default: page.description }}">
    <meta name="twitter:image" content="{{ page.og_image }}">

    <link rel="stylesheet" href="{{ '/assets/css/tokens.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/layout.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/components.css' | relative_url }}">
    <script defer src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </head>
  <body>
    <a class="skip-link" href="#contenu">Aller au contenu</a>
    {% include header.html %}
    <main id="contenu" class="container flow">
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>
